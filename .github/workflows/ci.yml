name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (tests + architecture boundary)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend test suite
        run: pytest

      # Enforces CLAUDE.md's "module -> core, never core -> module" rule as
      # an automated gate, not just the AST-based pytest test
      # (tests/test_core_independence.py, which still runs above as part of
      # the suite) -- see PROJECT_ANALYSIS.md sections 4.3/7/10, which
      # document this as a CI-enforced guarantee. Before this workflow
      # existed, the import-linter contract in pyproject.toml was declared
      # but never actually run anywhere (PROJECT_AUDIT.md S2).
      - name: Run import-linter (core/module architecture boundary)
        run: lint-imports

  frontend:
    name: Frontend (typecheck + production build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Production build
        run: npm run build
